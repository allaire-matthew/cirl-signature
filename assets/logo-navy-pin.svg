<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <!-- Pin teardrop -->
  <path d="M72 10 C40 10 12 38 12 70 C12 112 72 192 72 192 S132 112 132 70 C132 38 104 10 72 10 Z" fill="#1B2A4A"/>
  <!-- Circular compass seal outline -->
  <circle cx="72" cy="70" r="36" fill="none" stroke="#F6F1E7" stroke-width="1.5"/>

  <!-- 4 intercardinal needles (NE, SE, SW, NW) - shorter, cream -->
  <path d="M93 49 L72 70 L68 66 Z" fill="#F6F1E7"/>
  <path d="M93 91 L72 70 L68 74 Z" fill="#F6F1E7"/>
  <path d="M51 91 L72 70 L76 74 Z" fill="#F6F1E7"/>
  <path d="M51 49 L72 70 L76 66 Z" fill="#F6F1E7"/>

  <!-- 4 cardinal needles - longer, reaching circle edge -->
  <!-- South -->
  <path d="M72 106 L75 70 L69 70 Z" fill="#F6F1E7"/>
  <!-- East -->
  <path d="M108 70 L72 73 L72 67 Z" fill="#F6F1E7"/>
  <!-- West -->
  <path d="M36 70 L72 67 L72 73 Z" fill="#F6F1E7"/>
  <!-- North (gold, drawn last, on top) -->
  <path d="M72 34 L75 70 L69 70 Z" fill="#E8B64C"/>

  <!-- Wordmark -->
  <text x="176" y="86" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1B2A4A" letter-spacing="5">COMMONWEALTH</text>
  <text x="176" y="144" font-family="Georgia, serif" font-size="42" font-weight="400" fill="#D4A843">IRL.</text>
</svg>
