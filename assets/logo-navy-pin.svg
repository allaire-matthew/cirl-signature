<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <!-- Pin teardrop -->
  <path d="M72 10 C40 10 12 38 12 70 C12 112 72 192 72 192 S132 112 132 70 C132 38 104 10 72 10 Z" fill="#1B2A4A"/>
  <!-- Circular compass seal outline -->
  <circle cx="72" cy="70" r="36" fill="none" stroke="#F6F1E7" stroke-width="1.5"/>

  <!-- 8-point compass rose, all gold, all thin diamonds meeting at center -->
  <!-- Intercardinals (shortest) drawn first -->
  <path d="M82 60 L78 66 L72 70 L76 64 Z" fill="#E8B64C"/>
  <path d="M82 80 L78 74 L72 70 L76 76 Z" fill="#E8B64C"/>
  <path d="M62 80 L68 76 L72 70 L66 74 Z" fill="#E8B64C"/>
  <path d="M62 60 L66 66 L72 70 L68 64 Z" fill="#E8B64C"/>

  <!-- Cardinals S/E/W (medium length) -->
  <path d="M72 98 L74 84 L72 70 L70 84 Z" fill="#E8B64C"/>
  <path d="M100 70 L86 68 L72 70 L86 72 Z" fill="#E8B64C"/>
  <path d="M44 70 L58 72 L72 70 L58 68 Z" fill="#E8B64C"/>

  <!-- North cardinal (longest, reaches circle edge) -->
  <path d="M72 34 L75 52 L72 70 L69 52 Z" fill="#E8B64C"/>

  <!-- Wordmark -->
  <text x="176" y="86" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1B2A4A" letter-spacing="5">COMMONWEALTH</text>
  <text x="176" y="144" font-family="Georgia, serif" font-size="42" font-weight="400" fill="#D4A843">IRL.</text>
</svg>
